<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DDB Roll Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      color: #c89b3c;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
    }

    .token-status {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      background: #0d0d1a;
      border: 1px solid #333;
    }

    .token-status.ok    { border-color: #2a6; color: #4d4; }
    .token-status.warn  { border-color: #a60; color: #fa0; }
    .token-status.error { border-color: #a22; color: #f66; }

    .campaigns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .campaign-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d0d1a;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .campaign-row .name { flex: 1; }

    .campaign-row .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 8px;
    }

    .badge.active { background: #1a3a1a; color: #4d4; border: 1px solid #2a6; }
    .badge.paused { background: #2a2a1a; color: #aa8; border: 1px solid #665; }

    .campaign-row .sync-status {
      font-size: 10px;
      color: #666;
      margin-left: 8px;
      min-width: 60px;
      text-align: right;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.4; cursor: default; }

    #btn-sync-all {
      background: #c89b3c;
      color: #1a1a2e;
    }

    #btn-sync-all:hover:not(:disabled) { opacity: 0.85; }

    #btn-clear-log {
      background: #2a2a3e;
      color: #888;
      flex: 0 0 80px;
    }

    #log {
      background: #0a0a18;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      height: 160px;
      overflow-y: auto;
      line-height: 1.6;
    }

    #log .info  { color: #aaa; }
    #log .ok    { color: #4d4; }
    #log .warn  { color: #fa0; }
    #log .error { color: #f66; }
    #log .head  { color: #c89b3c; }
  </style>
</head>
<body>
  <h1>🎲 DDB Roll Sync</h1>
  <p class="subtitle">Syncs dice rolls from D&amp;D Beyond → Supabase</p>

  <div id="token-status" class="token-status warn">
    ⏳ No token captured yet — browse any DDB page first.
  </div>

  <div class="campaigns" id="campaign-list">
    <!-- populated by popup.js -->
  </div>

  <div class="buttons">
    <button id="btn-sync-all" disabled>⚡ Sync All Campaigns</button>
    <button id="btn-clear-log">Clear</button>
  </div>

  <div id="log"><span class="info">Ready.</span></div>

  <script src="popup.js"></script>
</body>
</html>
